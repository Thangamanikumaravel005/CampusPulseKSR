<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPulse - Feedback</title>

    <link rel="stylesheet" href="feedback.css">
</head>

<body>

    <header class="event-header">

        <div class="header-content">

            <h1>💬 CampusPulse Feedback</h1>

            <p>
                Help us improve your experience
            </p>

        </div>

    </header>

    <!-- Feedback Form -->

    <div class="feedback-container">

        <form
            id="feedbackForm"
            class="feedback-form">

            <h2>Feedback Form</h2>

            <label for="name">
                Full Name
            </label>

            <input
                type="text"
                id="name"
                placeholder="Enter Your Name"
                required>

            <label for="email">
                Email Address
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter Your Email"
                required>

            <label for="rating">
                How would you rate your overall experience?
            </label>

            <select
                id="rating"
                required>

                <option value="">
                    Select Rating
                </option>

                <option>⭐⭐⭐⭐⭐ Excellent</option>
                <option>⭐⭐⭐⭐ Good</option>
                <option>⭐⭐⭐ Average</option>
                <option>⭐⭐ Poor</option>
                <option>⭐ Very Poor</option>

            </select>

            <label for="feature">
                Which feature did you use the most?
            </label>

            <select
                id="feature"
                required>

                <option value="">
                    Select Feature
                </option>

                <option>Events</option>
                <option>Workshops</option>
                <option>Sports</option>
                <option>Cultural Activities</option>
                <option>Search & Filters</option>

            </select>

            <label>
                Was it easy to find information?
            </label>

            <div class="radio-group">

                <label>
                    <input
                        type="radio"
                        name="easy"
                        value="Yes"
                        required>
                    Yes
                </label>

                <label>
                    <input
                        type="radio"
                        name="easy"
                        value="No">
                    No
                </label>

            </div>

            <label for="suggestions">
                Additional Suggestions
            </label>

            <textarea
                id="suggestions"
                rows="5"
                placeholder="Share your suggestions here...">
            </textarea>

            <button type="submit">

                Submit Feedback

            </button>

        </form>

    </div>

    <!-- Footer -->

    <footer class="event-footer">

        <div class="footer-content">

            <p>
                © 2026 CampusPulse |
                University Event Portal
            </p>

            <a href="feedback.html">
</a>

            <a href="home.html">

                <button class="home-btn">

                    ⬅ Back to About Page

                </button>

            </a>

        </div>

    </footer>

    <script src="feedback.js"></script>

</body>
</html>
